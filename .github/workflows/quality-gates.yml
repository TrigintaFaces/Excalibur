name: Quality Gates

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  COVERAGE_THRESHOLD: 65

jobs:
  core-perf-change-detection:
    name: Detect Core/Perf Changes
    runs-on: ubuntu-latest
    outputs:
      core_perf: ${{ steps.filter.outputs.core_perf }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="$(git rev-parse HEAD^ 2>/dev/null || echo HEAD)"
            HEAD_SHA="$(git rev-parse HEAD)"
          fi

          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            git fetch --no-tags --depth=1 origin "${BASE_SHA}"
          fi
          if ! git cat-file -e "${HEAD_SHA}^{commit}" 2>/dev/null; then
            git fetch --no-tags --depth=1 origin "${HEAD_SHA}"
          fi

          CHANGED=$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}" 2>/dev/null || echo "")

          if echo "$CHANGED" | grep -qE '^(src/Dispatch/|src/Excalibur/|tests/|benchmarks/|eng/)'; then
            echo "core_perf=true" >> "$GITHUB_OUTPUT"
          else
            echo "core_perf=false" >> "$GITHUB_OUTPUT"
          fi

  # Code analysis gate -- build with -warnaserror to enforce analyzer rules
  code-analysis:
    name: Code Analysis (Warning-as-Error Build)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Free disk space
        shell: bash
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/swift /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /home/linuxbrew /usr/local/.ghcup /usr/local/share/boost || true
          sudo apt-get clean || true
          docker system prune -af || true

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore and build with warning-as-error
        run: |
          dotnet restore --verbosity quiet
          dotnet build --configuration Release --no-restore --verbosity quiet -warnaserror /p:TreatWarningsAsErrors=true

  # Code coverage quality gate (sharded, self-contained)
  coverage-shards:
    name: "Code Coverage (Shard: ${{ matrix.shard.name }})"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        shard:
          - { name: core, filter: "eng/ci/shards/UnitTests-Core.slnf", test_filter: "(Category=Unit|Category=DependencyInjection)&Category!=Performance" }
          - { name: transport, filter: "eng/ci/shards/UnitTests-Transport.slnf", test_filter: "(Category=Unit|Category=DependencyInjection)&Category!=Performance" }
          - { name: middleware, filter: "eng/ci/shards/UnitTests-Middleware.slnf", test_filter: "(Category=Unit|Category=DependencyInjection)&Category!=Performance" }
          - { name: excalibur, filter: "eng/ci/shards/UnitTests-Excalibur.slnf", test_filter: "(Category=Unit|Category=DependencyInjection)&Category!=Performance" }
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore and build shard
        run: |
          dotnet restore ${{ matrix.shard.filter }} --verbosity quiet
          dotnet build ${{ matrix.shard.filter }} --configuration Release --no-restore --verbosity quiet

      - name: Run shard tests with coverage
        run: |
          dotnet test ${{ matrix.shard.filter }} \
            --configuration Release \
            --no-build \
            --blame-hang-timeout 5m \
            --logger "console;verbosity=minimal" \
            --collect:"XPlat Code Coverage" \
            --settings tests/coverage.runsettings \
            --results-directory ./coverage \
            --filter "${{ matrix.shard.test_filter }}" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload shard coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-shard-${{ matrix.shard.name }}
          path: ./coverage/**/coverage.cobertura.xml
          if-no-files-found: error
          retention-days: 7

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: coverage-shards
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
      - name: Download shard coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-shard-*
          path: coverage
          merge-multiple: true

      - name: Merge coverage reports
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool || true
          reportgenerator \
            -reports:"./coverage/**/coverage.cobertura.xml" \
            -targetdir:"./coverage/merged" \
            -reporttypes:"Cobertura;HtmlSummary;TextSummary"

      - name: Enforce coverage threshold
        id: coverage_threshold
        shell: pwsh
        run: |
          ./eng/ci/coverage-threshold.ps1 `
            -CoverageRoot "coverage" `
            -Threshold ([int]'${{ env.COVERAGE_THRESHOLD }}') `
            -FailBelowThreshold
      - name: Coverage threshold status
        shell: bash
        run: |
          combined="${{ steps.coverage_threshold.outputs.coverage_combined_pct }}"
          dispatch="${{ steps.coverage_threshold.outputs.coverage_dispatch_pct }}"
          excalibur="${{ steps.coverage_threshold.outputs.coverage_excalibur_pct }}"
          threshold="${{ env.COVERAGE_THRESHOLD }}"

          echo "Coverage (Dispatch): ${dispatch}%"
          echo "Coverage (Excalibur): ${excalibur}%"
          echo "Coverage (Combined): ${combined}%"
          echo "Target threshold: ${threshold}%"

          if [ -z "$combined" ]; then
            echo "::warning::Coverage threshold script did not emit combined coverage output."
            exit 0
          fi

          if (( $(awk "BEGIN {print ($combined < $threshold)}") )); then
            echo "::warning::Coverage below target (report-only): combined ${combined}% < required ${threshold}%."
          else
            echo "✅ Coverage target met: ${combined}% >= ${threshold}%."
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: ./coverage/merged
          retention-days: 7

  # Test quality gate (self-contained)
  test-quality:
    name: Test Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore and build
        run: |
          dotnet restore eng/ci/shards/UnitTests-Deterministic.slnf --verbosity quiet
          dotnet build eng/ci/shards/UnitTests-Deterministic.slnf --configuration Release --no-restore --verbosity quiet

      - name: Run deterministic unit and DI tests
        run: |
          dotnet test eng/ci/shards/UnitTests-Deterministic.slnf --configuration Release --no-build \
            --blame-hang-timeout 5m \
            --filter "(Category=Unit|Category=DependencyInjection)&Category!=Performance" \
            --logger "trx;LogFileName=test-results.trx" \
            --logger "console;verbosity=minimal" \
            --results-directory ./test-results

      - name: Validate no test failures
        run: |
          # Count test results
          PASSED=$(find ./test-results -name "*.trx" -exec grep -o 'outcome="Passed"' {} \; | wc -l)
          FAILED=$(find ./test-results -name "*.trx" -exec grep -o 'outcome="Failed"' {} \; | wc -l)

          echo "Tests passed: $PASSED"
          echo "Tests failed: $FAILED"

          if [ "$FAILED" -gt 0 ]; then
            echo "❌ $FAILED test(s) failed"
            exit 1
          else
            echo "✅ All tests passed"
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: ./test-results
          retention-days: 7

  # Transport conformance (self-contained, conditional)
  transport-conformance:
    name: Transport Conformance (Core/Perf Changes)
    runs-on: ubuntu-latest
    needs: core-perf-change-detection
    if: github.event_name == 'workflow_dispatch' || needs.core-perf-change-detection.outputs.core_perf == 'true'
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore and build
        run: |
          dotnet restore tests/conformance/Excalibur.Dispatch.Tests.Conformance/Excalibur.Dispatch.Tests.Conformance.csproj --verbosity quiet
          dotnet build tests/conformance/Excalibur.Dispatch.Tests.Conformance/Excalibur.Dispatch.Tests.Conformance.csproj --configuration Release --no-restore --verbosity quiet

      - name: Run transport conformance suite
        run: |
          dotnet test tests/conformance/Excalibur.Dispatch.Tests.Conformance/Excalibur.Dispatch.Tests.Conformance.csproj \
            --configuration Release \
            --no-build \
            --blame-hang-timeout 10m \
            --filter "Category=TransportConformance" \
            --logger "trx;LogFileName=transport-conformance.trx" \
            --logger "console;verbosity=minimal" \
            --results-directory ./transport-conformance-results

      - name: Upload transport conformance results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: transport-conformance-results
          path: ./transport-conformance-results
          retention-days: 7

  # Solution governance gate (Sprint 506)
  governance:
    name: Solution Governance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Validate solution governance
        shell: pwsh
        run: ./eng/validate-solution.ps1

      - name: Warning audit (informational)
        shell: pwsh
        continue-on-error: true
        run: |
          if (Test-Path "eng/ci/shards/ShippingOnly.slnf") {
            ./eng/audit-warnings.ps1 -Configuration Release
          } else {
            Write-Host "eng/ci/shards/ShippingOnly.slnf not found, skipping warning audit"
          }

  # Architecture validation gate (self-contained)
  architecture:
    name: Architecture Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Validate Dispatch-Excalibur Dependency Direction
        run: |
          echo "Checking for forbidden Dispatch-Excalibur references..."

          PROJECT_VIOLATIONS=$(grep -rE '<ProjectReference.*Excalibur\.(Domain|EventSourcing|Data|Saga|Application|Outbox|Jobs|LeaderElection[^.]|Hosting\.(Web|Jobs)|Security[^.])' src/Dispatch/**/*.csproj 2>/dev/null || true)
          PACKAGE_VIOLATIONS=$(grep -rE '<PackageReference.*Include="Excalibur\.(Domain|EventSourcing|Data|Saga|Application|Outbox|Jobs|Security)' src/Dispatch/**/*.csproj 2>/dev/null || true)

          VIOLATIONS=""
          if [ -n "$PROJECT_VIOLATIONS" ]; then VIOLATIONS="$PROJECT_VIOLATIONS"; fi
          if [ -n "$PACKAGE_VIOLATIONS" ]; then VIOLATIONS="$VIOLATIONS$PACKAGE_VIOLATIONS"; fi

          if [ -n "$VIOLATIONS" ]; then
            echo "❌ DEPENDENCY DIRECTION VIOLATION DETECTED"
            echo "$VIOLATIONS"
            exit 1
          else
            echo "✅ No Dispatch-Excalibur dependency violations found"
          fi

      - name: Build architecture tests
        run: |
          if [ -d "tests/architecture/Boundary.Tests" ]; then
            dotnet restore tests/architecture/Boundary.Tests/Boundary.Tests.csproj --verbosity quiet
            dotnet build tests/architecture/Boundary.Tests/Boundary.Tests.csproj --configuration Release --no-restore --verbosity quiet
          fi

      - name: Run architecture tests
        run: |
          if [ -d "tests/ArchitectureTests" ]; then
            dotnet restore tests/ArchitectureTests --verbosity quiet
            dotnet build tests/ArchitectureTests --configuration Release --no-restore --verbosity quiet
            dotnet test tests/ArchitectureTests --configuration Release --no-build --blame-hang-timeout 5m --logger "console;verbosity=quiet"
          else
            echo "Architecture test project not found, skipping..."
          fi

      - name: Run boundary tests (Sprint 506)
        run: |
          if [ -d "tests/architecture/Boundary.Tests" ]; then
            dotnet test tests/architecture/Boundary.Tests/ --configuration Release --no-build --blame-hang-timeout 5m --logger "console;verbosity=quiet"
          else
            echo "Boundary.Tests project not yet created, skipping..."
          fi

  # API compatibility gate
  api-compatibility:
    name: API Compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Run API compatibility report
        shell: pwsh
        run: |
          ./eng/ci/api-compat-run.ps1 -OutputDir management/reports/ApiCompatReport

      - name: Upload API compatibility report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: api-compat-report-quality-gates
          path: management/reports/ApiCompatReport
          retention-days: 7

  # Summary gate -- blocking vs advisory split
  summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs: [coverage, test-quality, transport-conformance, code-analysis, governance, architecture, api-compatibility]
    if: always()
    steps:
      - name: Check all gates
        run: |
          echo "Quality Gates Summary"
          echo "===================="
          echo ""

          blocking_failures=""
          advisory_failures=""

          # --- Blocking gates ---
          check_blocking() {
            local gate="$1"
            local result="$2"
            if [ "$result" != "success" ]; then
              echo "::error::Blocking gate failed: ${gate} (${result})"
              blocking_failures="${blocking_failures}${gate}=${result} "
            fi
          }

          check_blocking "coverage" "${{ needs.coverage.result }}"
          check_blocking "test-quality" "${{ needs.test-quality.result }}"
          check_blocking "code-analysis" "${{ needs.code-analysis.result }}"
          check_blocking "governance" "${{ needs.governance.result }}"
          check_blocking "architecture" "${{ needs.architecture.result }}"
          check_blocking "api-compatibility" "${{ needs.api-compatibility.result }}"

          # --- Advisory gates ---
          conformance_result="${{ needs.transport-conformance.result }}"
          if [ "$conformance_result" != "success" ] && [ "$conformance_result" != "skipped" ]; then
            advisory_failures="${advisory_failures}transport-conformance=${conformance_result} "
          fi

          # --- Report ---
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Quality Gates" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Gate | Result | Tier |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Code Coverage | ${{ needs.coverage.result }} | blocking |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test Quality | ${{ needs.test-quality.result }} | blocking |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Code Analysis | ${{ needs.code-analysis.result }} | blocking |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Governance | ${{ needs.governance.result }} | blocking |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Architecture | ${{ needs.architecture.result }} | blocking |" >> "$GITHUB_STEP_SUMMARY"
          echo "| API Compatibility | ${{ needs.api-compatibility.result }} | blocking |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Transport Conformance | ${{ needs.transport-conformance.result }} | advisory |" >> "$GITHUB_STEP_SUMMARY"

          if [ -n "$blocking_failures" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "❌ Blocking gate failures: ${blocking_failures}" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          if [ -n "$advisory_failures" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "⚠️ Advisory gate failures (non-blocking): ${advisory_failures}" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ All blocking quality gates passed." >> "$GITHUB_STEP_SUMMARY"
