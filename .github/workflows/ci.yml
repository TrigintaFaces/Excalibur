name: Continuous Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      run_performance_tests:
        description: 'Run performance regression tests'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  COVERAGE_THRESHOLD: 65

jobs:
  # ── Package job (Ubuntu) -- NuGet packaging, deterministic validation ──
  # Replaces the old 'build' job. Does NOT produce test artifacts.
  package:
    name: Package (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
          fetch-depth: 1

      - name: Free disk space
        shell: bash
        run: |
          set -euo pipefail
          echo "Disk usage before cleanup:"
          df -h
          sudo rm -rf /usr/local/lib/android &            # ~12GB
          sudo rm -rf /opt/hostedtoolcache/CodeQL &       # ~6GB
          sudo rm -rf /usr/share/swift &                  # ~1.5GB
          sudo rm -rf /opt/ghc &
          sudo rm -rf /home/linuxbrew &
          sudo rm -rf /usr/local/.ghcup &
          sudo rm -rf /usr/local/share/boost &
          sudo rm -rf /usr/local/share/powershell &
          wait
          sudo apt-get clean || true
          docker system prune -af 2>/dev/null || true
          echo "Disk usage after cleanup:"
          df -h

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: .nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore shipping projects
        run: dotnet restore eng/ci/shards/ShippingOnly.slnf --verbosity quiet

      # bd-afu8wj: Build the Dispatch core FIRST (clean, --no-incremental) before the transitive store
      # projects. A core public-API lag (RS0016/RS0017 — a public symbol missing its PublicAPI.*.txt
      # entry) then fails fast HERE with a clear "core public API" error, instead of surfacing late and
      # confusingly as a downstream store-project build failure (the recurring S859 churn pattern).
      - name: Build core first (fail fast on core public-API lag)
        run: dotnet build src/Dispatch/Excalibur.Dispatch/Excalibur.Dispatch.csproj --configuration Release --no-restore --no-incremental --verbosity quiet

      - name: Build shipping projects
        run: dotnet build eng/ci/shards/ShippingOnly.slnf --configuration Release --no-restore --verbosity quiet

      - name: Deterministic build validation
        run: |
          echo "Validating deterministic builds with CI flag..."
          dotnet build eng/ci/shards/ShippingOnly.slnf --configuration Release --no-restore -p:CI=true --verbosity quiet
          echo "Deterministic build validation successful"

      - name: Package validation
        run: |
          echo "Validating packageable projects..."
          dotnet pack eng/ci/shards/ShippingOnly.slnf --configuration Release --no-build --verbosity minimal --output ./packages
          echo "Package creation successful"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: |
            ./packages/*.nupkg
            ./packages/*.snupkg
          retention-days: 1

  # Security scanning (reusable workflow)
  call-security:
    needs: package
    uses: ./.github/workflows/security.yml
    with:
      checkout-ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      checkout-token: ${{ github.token }}
      event-name: ${{ github.event_name }}
    secrets: inherit

  # Governance validation (reusable workflow)
  call-governance:
    needs: package
    uses: ./.github/workflows/governance.yml
    with:
      checkout-ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      checkout-token: ${{ github.token }}
      event-name: ${{ github.event_name }}
    secrets: inherit

  # Documentation validation (independent, no build dependency)
  documentation-validation:
    name: Documentation Verification (T5.4)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        working-directory: docs-site
        run: npm ci

      - name: TypeScript check
        working-directory: docs-site
        run: npm run typecheck

      - name: Validate version-safe docs links
        working-directory: docs-site
        run: npm run validate:version-links

      - name: Build Docusaurus (enforcing zero warnings)
        working-directory: docs-site
        env:
          CI: true
          DOCUSAURUS_STRICT_LINKS: true
        run: |
          echo "Building Docusaurus with strict link validation..."
          npm run build 2>&1 | tee build-output.txt
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          WARNING_COUNT=$(grep -c -E "(warning|Warning)" build-output.txt || true)
          echo "Build exit code: $BUILD_EXIT_CODE"
          echo "Warning count: $WARNING_COUNT"
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "Docusaurus build FAILED"
            exit 1
          fi
          if [ "$WARNING_COUNT" -gt 0 ]; then
            echo "Found $WARNING_COUNT warnings in Docusaurus build"
            echo "DOCS_WARNINGS=$WARNING_COUNT" >> $GITHUB_ENV
          else
            echo "Docusaurus build completed with zero warnings"
            echo "DOCS_WARNINGS=0" >> $GITHUB_ENV
          fi

      - name: Verify build output exists
        run: |
          if [ ! -d "docs-site/build" ]; then
            echo "Build output directory not found"
            exit 1
          fi
          FILE_COUNT=$(find docs-site/build -name "*.html" | wc -l)
          echo "Built $FILE_COUNT HTML pages"
          if [ "$FILE_COUNT" -lt 10 ]; then
            echo "Build appears incomplete (less than 10 HTML pages)"
            exit 1
          fi

      - name: Upload build output for inspection
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: docs-build-output
          path: docs-site/build-output.txt
          retention-days: 7

      - name: Documentation validation summary
        if: always()
        run: |
          echo "## Documentation Verification (T5.4)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript Check | ${{ job.status == 'success' && 'PASS' || 'FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docusaurus Build | ${{ job.status == 'success' && 'PASS' || 'FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Warnings | ${{ env.DOCS_WARNINGS || '0' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "Documentation verification passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "Documentation verification failed - see logs for details" >> $GITHUB_STEP_SUMMARY
          fi

  # ── Smoke tests -- no dependencies, starts immediately for fast PR feedback ──
  smoke-tests:
    name: Smoke Tests (Critical Path)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
      - name: Build and test
        uses: ./.github/actions/build-and-test
        with:
          solution-filter: eng/ci/shards/TestsOnly.slnf
          test-filter: "Priority=0"
          results-prefix: smoke-tests
          quarantine-mode: None
          base-test-filter: "Priority=0"
          test-session-timeout: '300000'

      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-smoke
          path: TestResults/*.trx
          retention-days: 7

  # ── Unit shard coverage audit ──
  unit-shard-coverage:
    name: Unit Shard Coverage Audit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: package
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Validate unit-test shard coverage
        shell: pwsh
        run: |
          ./eng/ci/validate-unit-shards.ps1 -OutDir management/reports/UnitShardReport -Enforce $true

      - name: Upload shard coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-shard-coverage-report
          path: management/reports/UnitShardReport
          retention-days: 14

  # ── Unit tests -- 4 deterministic shards, self-contained build per shard ──
  unit-tests:
    name: Unit Tests (${{ matrix.shard.name }})
    runs-on: ubuntu-latest
    needs: smoke-tests
    timeout-minutes: 15
    strategy:
      matrix:
        shard:
          - { name: core, filter: "eng/ci/shards/UnitTests-Core.slnf" }
          - { name: transport, filter: "eng/ci/shards/UnitTests-Transport.slnf" }
          - { name: middleware, filter: "eng/ci/shards/UnitTests-Middleware.slnf" }
          - { name: excalibur, filter: "eng/ci/shards/UnitTests-Excalibur.slnf" }
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
      - name: Build and test
        uses: ./.github/actions/build-and-test
        with:
          solution-filter: ${{ matrix.shard.filter }}
          collect-coverage: 'true'
          results-prefix: unit-tests-${{ matrix.shard.name }}
          free-disk-space: 'true'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-unit-${{ matrix.shard.name }}
          path: TestResults/*.trx
          retention-days: 30

      - name: Upload code coverage
        uses: actions/upload-artifact@v7
        with:
          name: code-coverage-unit-${{ matrix.shard.name }}
          path: TestResults/*/coverage.cobertura.xml
          if-no-files-found: warn
          retention-days: 30

  # ── Async-risk unit tests -- advisory on PRs, blocking on push to main ──
  unit-tests-async-risk:
    name: Unit Tests - Async Risk (${{ matrix.shard.name }})
    runs-on: ubuntu-latest
    needs: smoke-tests
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    timeout-minutes: 15
    strategy:
      matrix:
        shard:
          - { name: messaging, filter: "eng/ci/shards/UnitTests-Messaging.slnf" }
          - { name: observability, filter: "eng/ci/shards/UnitTests-Observability.slnf" }
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
      - name: Build and test
        uses: ./.github/actions/build-and-test
        with:
          solution-filter: ${{ matrix.shard.filter }}
          collect-coverage: 'true'
          results-prefix: unit-tests-async-risk-${{ matrix.shard.name }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-unit-async-risk-${{ matrix.shard.name }}
          path: TestResults/*.trx
          retention-days: 30

      - name: Upload code coverage
        uses: actions/upload-artifact@v7
        with:
          name: code-coverage-unit-async-risk-${{ matrix.shard.name }}
          path: TestResults/*/coverage.cobertura.xml
          if-no-files-found: warn
          retention-days: 30

  # ── Cross-platform: Windows deterministic ──
  unit-tests-windows:
    name: Unit Tests (Windows - Deterministic)
    runs-on: windows-latest
    needs: smoke-tests
    timeout-minutes: 60
    env:
      VSTEST_CONNECTION_TIMEOUT: 600
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
      - name: Build and test
        uses: ./.github/actions/build-and-test
        with:
          solution-filter: eng/ci/shards/UnitTests-Deterministic.slnf
          collect-coverage: 'false'
          results-prefix: unit-tests-windows-deterministic
          test-session-timeout: '1500000'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-unit-windows-deterministic
          path: TestResults/*.trx
          retention-days: 30

  # ── Cross-platform: Windows async-risk ──
  unit-tests-windows-async-risk:
    name: Unit Tests (Windows - Async Risk)
    runs-on: windows-latest
    needs: smoke-tests
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    timeout-minutes: 60
    env:
      VSTEST_CONNECTION_TIMEOUT: 600
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
      - name: Build and test
        uses: ./.github/actions/build-and-test
        with:
          solution-filter: eng/ci/shards/UnitTests-AsyncRisk.slnf
          collect-coverage: 'false'
          results-prefix: unit-tests-windows-async-risk
          max-cpu-count: '1'
          test-session-timeout: '1500000'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-unit-windows-async-risk
          path: TestResults/*.trx
          retention-days: 30

  # ── Cross-platform: macOS deterministic ──
  unit-tests-macos:
    name: Unit Tests (macOS - Deterministic)
    runs-on: macos-latest
    needs: smoke-tests
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
      - name: Build and test
        uses: ./.github/actions/build-and-test
        with:
          solution-filter: eng/ci/shards/UnitTests-Deterministic.slnf
          collect-coverage: 'false'
          results-prefix: unit-tests-macos-deterministic
          test-session-timeout: '1500000'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-unit-macos-deterministic
          path: TestResults/*.trx
          retention-days: 30

  # ── Cross-platform: macOS async-risk (sequenced after deterministic to limit 10x billing) ──
  unit-tests-macos-async-risk:
    name: Unit Tests (macOS - Async Risk)
    runs-on: macos-latest
    needs: unit-tests-macos
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
      - name: Build and test
        uses: ./.github/actions/build-and-test
        with:
          solution-filter: eng/ci/shards/UnitTests-AsyncRisk.slnf
          collect-coverage: 'false'
          results-prefix: unit-tests-macos-async-risk
          max-cpu-count: '1'
          test-session-timeout: '1500000'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-unit-macos-async-risk
          path: TestResults/*.trx
          retention-days: 30

  # ── Integration tests -- self-contained build, Docker pre-flight, -m:1 ──
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
      - name: Setup build environment
        uses: ./.github/actions/setup-dotnet-build
        with:
          solution-filter: eng/ci/shards/IntegrationTests.slnf

      - name: Integration preflight diagnostics
        shell: pwsh
        run: |
          Write-Host "Runner OS: $env:RUNNER_OS"
          Write-Host "DOTNET_ROOT: $env:DOTNET_ROOT"
          Write-Host "GITHUB_ACTIONS: $env:GITHUB_ACTIONS"
          Write-Host "Docker command available: $([bool](Get-Command docker -ErrorAction SilentlyContinue))"
          if (Get-Command docker -ErrorAction SilentlyContinue) {
            docker --version
          }
          foreach ($name in @('AZURE_KEYVAULT_URI', 'COSMOS_EMULATOR_ENDPOINT')) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              Write-Host ("{0}: not set" -f $name)
            }
            else {
              Write-Host ("{0}: set" -f $name)
            }
          }

      - name: Verify XPlat coverage collector package
        shell: bash
        run: |
          set -euo pipefail
          dotnet list tests/integration/Excalibur.Dispatch.Integration.Tests/Excalibur.Dispatch.Integration.Tests.csproj package --include-transitive | tee integration-packages.log
          if ! grep -qi "coverlet\\.collector" integration-packages.log; then
            echo "::error::coverlet.collector package is unavailable for integration tests (XPlat Code Coverage collector)."
            exit 1
          fi

      - name: Compose integration test filter
        shell: pwsh
        run: |
          $baseFilter = 'Category=Integration|Category=EndToEnd'
          $filterInfo = ./eng/ci/get-test-filter.ps1 -BaseFilter $baseFilter -Mode Exclude -AsJson | ConvertFrom-Json
          "INTEGRATION_TEST_FILTER=$($filterInfo.filter)" >> $env:GITHUB_ENV
          Write-Host "Using integration filter with $($filterInfo.count) quarantined exclusions."

      - name: Run Integration Tests
        id: run-integration
        continue-on-error: true
        run: |
          dotnet test eng/ci/shards/IntegrationTests.slnf \
            -m:1 \
            --configuration Release \
            --no-build \
            --blame-hang-timeout 10m \
            --logger "trx;LogFilePrefix=integration-tests" \
            --logger "console;verbosity=minimal" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --filter "${{ env.INTEGRATION_TEST_FILTER }}" \
            -- RunConfiguration.TestSessionTimeout=3600000 DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Cleanup orphaned Docker containers
        if: always()
        run: |
          # Kill any TestContainers that survived a test host crash
          docker ps -q --filter "name=vault-compliance-test" | xargs -r docker rm -f 2>/dev/null || true
          docker ps -q --filter "name=testcontainers" | xargs -r docker rm -f 2>/dev/null || true

      - name: Verify integration test results
        if: always()
        shell: pwsh
        run: |
          $trxFiles = Get-ChildItem -Path ./TestResults -Filter "*.trx" -Recurse -ErrorAction SilentlyContinue
          if ($trxFiles.Count -eq 0) {
            Write-Error "No TRX result files found — test run may have failed to start"
            exit 1
          }
          $totalFailed = 0
          foreach ($trx in $trxFiles) {
            [xml]$xml = Get-Content $trx.FullName
            $counters = $xml.TestRun.ResultSummary.Counters
            $failed = [int]$counters.failed
            $passed = [int]$counters.passed
            $total = [int]$counters.total
            Write-Host "$($trx.Name): passed=$passed failed=$failed total=$total"
            $totalFailed += $failed
          }
          if ($totalFailed -gt 0) {
            Write-Error "Integration tests had $totalFailed failure(s)"
            exit 1
          }
          Write-Host "All integration tests passed (test host cleanup crash is non-fatal)"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-integration
          path: TestResults/*.trx
          retention-days: 30

      - name: Upload code coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: code-coverage-integration
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn
          retention-days: 30

  # ── Functional tests -- self-contained build ──
  functional-tests:
    name: Functional Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
      - name: Setup build environment
        uses: ./.github/actions/setup-dotnet-build
        with:
          solution-filter: eng/ci/shards/TestsOnly.slnf

      - name: Compose functional test filter
        shell: pwsh
        run: |
          $filterInfo = ./eng/ci/get-test-filter.ps1 -BaseFilter 'Category=Functional' -Mode Exclude -AsJson | ConvertFrom-Json
          "FUNCTIONAL_TEST_FILTER=$($filterInfo.filter)" >> $env:GITHUB_ENV
          Write-Host "Using functional filter with $($filterInfo.count) quarantined exclusions."

      - name: Run Functional Tests
        run: |
          dotnet test eng/ci/shards/TestsOnly.slnf \
            --configuration Release \
            --no-build \
            --blame-hang-timeout 5m \
            --logger "trx;LogFileName=functional-tests.trx" \
            --logger "console;verbosity=minimal" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --filter "${{ env.FUNCTIONAL_TEST_FILTER }}" \
            -- RunConfiguration.TestSessionTimeout=1800000 DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-functional
          path: TestResults/*.trx
          retention-days: 30

      - name: Upload code coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: code-coverage-functional
          path: TestResults/*/coverage.cobertura.xml
          if-no-files-found: warn
          retention-days: 30

  # ── Contract tests -- self-contained build ──
  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
      - name: Setup build environment
        uses: ./.github/actions/setup-dotnet-build
        with:
          solution-filter: eng/ci/shards/TestsOnly.slnf

      - name: Run contract tests
        run: |
          dotnet test tests/contract/Excalibur.Dispatch.Contract.Tests/Excalibur.Dispatch.Contract.Tests.csproj \
            --configuration Release \
            --no-build \
            --blame-hang-timeout 5m \
            --logger "trx;LogFileName=contract-tests.trx" \
            --logger "console;verbosity=minimal" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload contract test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-contract
          path: TestResults/*.trx
          retention-days: 30

      - name: Upload code coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: code-coverage-contract
          path: TestResults/*/coverage.cobertura.xml
          if-no-files-found: warn
          retention-days: 30

  # ── Architecture tests -- self-contained build ──
  architecture-tests:
    name: Architecture Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
      - name: Setup build environment
        uses: ./.github/actions/setup-dotnet-build
        with:
          solution-filter: eng/ci/shards/TestsOnly.slnf

      - name: Run architecture test projects
        run: |
          dotnet test tests/architecture/Boundary.Tests/Boundary.Tests.csproj \
            --configuration Release \
            --no-build \
            --blame-hang-timeout 5m \
            --logger "trx;LogFileName=boundary-tests.trx" \
            --logger "console;verbosity=minimal" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload architecture test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-architecture
          path: TestResults/*.trx
          retention-days: 30

      - name: Upload code coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: code-coverage-architecture
          path: TestResults/*/coverage.cobertura.xml
          if-no-files-found: warn
          retention-days: 30

  # ── Flaky quarantine governance ──
  flaky-quarantine-governance:
    name: Flaky Quarantine Governance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: package
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Validate flaky quarantine policy
        shell: pwsh
        run: |
          ./eng/ci/validate-flaky-quarantine.ps1 -OutDir management/reports/FlakyQuarantineReport -Enforce:$true

      - name: Upload quarantine governance report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: flaky-quarantine-report
          path: management/reports/FlakyQuarantineReport
          retention-days: 30

  # ── Flaky tests quarantine run (non-blocking) ──
  flaky-tests-quarantine:
    name: Flaky Tests Quarantine (Non-blocking)
    runs-on: ubuntu-latest
    needs: flaky-quarantine-governance
    if: always()
    continue-on-error: true
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: .nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Compose quarantined test filter
        shell: pwsh
        run: |
          $filterInfo = ./eng/ci/get-test-filter.ps1 -Mode Include -AsJson | ConvertFrom-Json
          "FLAKY_TEST_FILTER=$($filterInfo.filter)" >> $env:GITHUB_ENV
          "FLAKY_TEST_COUNT=$($filterInfo.count)" >> $env:GITHUB_ENV
          if ([int]$filterInfo.count -eq 0) {
            "## Flaky Tests Quarantine" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "No tests are currently quarantined." >> $env:GITHUB_STEP_SUMMARY
          }
          else {
            Write-Host "Running $($filterInfo.count) quarantined tests."
          }

      - name: Restore dependencies
        if: env.FLAKY_TEST_COUNT != '0'
        run: dotnet restore eng/ci/shards/TestsOnly.slnf --verbosity quiet

      - name: Build
        if: env.FLAKY_TEST_COUNT != '0'
        run: dotnet build eng/ci/shards/TestsOnly.slnf --configuration Release --no-restore --verbosity quiet

      - name: Run quarantined tests
        if: env.FLAKY_TEST_COUNT != '0'
        run: |
          dotnet test eng/ci/shards/TestsOnly.slnf \
            --configuration Release \
            --no-build \
            --blame-hang-timeout 5m \
            --logger "trx;LogFileName=flaky-quarantine.trx" \
            --logger "console;verbosity=minimal" \
            --results-directory ./TestResults \
            --filter "${{ env.FLAKY_TEST_FILTER }}"

      - name: Upload quarantined test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-flaky-quarantine
          path: TestResults/*.trx
          if-no-files-found: warn
          retention-days: 30

  # ── Serialization policy validation ──
  serialization-policy:
    name: Serialization Policy Validation (R0.14)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: package
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      - name: Validate Serializer Policy
        shell: pwsh
        run: |
          Write-Host "Validating serializer policy (R0.14, R20.24-26)..."
          ./eng/validate-serializer-policy.ps1
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Serializer policy validation FAILED" -ForegroundColor Red
            exit 1
          }
          Write-Host "Serializer policy validation PASSED" -ForegroundColor Green
      - name: Run serialization boundary audit (extended report)
        shell: pwsh
        run: |
          ./eng/ci/serialization-boundary-audit.ps1 -OutDir management/reports/SerializationBoundaryReport
      - name: Upload serialization boundary report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: serialization-boundary-report
          path: management/reports/SerializationBoundaryReport

  # ── AOT build analysis (report-only) ──
  aot-build-analysis:
    name: AOT Build Analysis (report-only)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: package
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      - name: Run trim/AOT audit (report-only)
        shell: pwsh
        run: |
          pwsh -File ./eng/ci/Invoke-AotBuildAnalysis.ps1 -OutputPath management/reports/AotBuildAnalysis
          $exitCode = $LASTEXITCODE
          Write-Host "::notice::AOT build analysis exited with code $exitCode (report-only, not failing build)"
      - name: Upload trim/AOT audit
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: aot-build-analysis
          path: management/reports/AotBuildAnalysis

  # ── Coverage analysis (reusable workflow) ──
  call-coverage:
    needs:
      - unit-tests
      - integration-tests
      - functional-tests
      - contract-tests
      - architecture-tests
    if: always()
    uses: ./.github/workflows/coverage.yml
    with:
      checkout-ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      checkout-token: ${{ github.token }}
      event-name: ${{ github.event_name }}
      coverage-threshold: '65'
      pr-base-sha: ${{ github.event.pull_request.base.sha || '' }}
      pr-number: ${{ github.event.pull_request.number || '' }}
    secrets: inherit

  # ── Performance gates (reusable workflow) ──
  call-performance:
    needs: package
    uses: ./.github/workflows/performance.yml
    with:
      checkout-ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      checkout-token: ${{ github.token }}
      run-performance-tests: ${{ github.event.inputs.run_performance_tests == 'true' || github.event_name == 'push' }}
    secrets: inherit

  # ── Quality analysis -- self-contained build ──
  quality:
    name: Quality Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: package
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
      - name: Setup build environment
        uses: ./.github/actions/setup-dotnet-build
        with:
          solution-filter: eng/ci/shards/ShippingOnly.slnf

      - name: Scan for vulnerable packages (R20.10)
        run: |
          echo "Scanning for vulnerable NuGet packages..."
          pwsh -File eng/scan-vulnerabilities.ps1

      - name: Validate serialization policy (R0.14, R20.24-26)
        run: |
          echo "Validating serialization policy..."
          pwsh -File eng/validate-serializer-policy.ps1

      - name: Validate architecture boundaries (R1.9, R17.8)
        run: |
          echo "Validating architecture boundaries..."
          pwsh -File eng/validate-architecture-boundaries.ps1

      - name: Install security scan tools
        run: |
          dotnet tool install --global security-scan --version 5.6.7 || true
          dotnet tool install --global dotnet-sonarscanner --version 6.2.0 || true

      - name: Run security analysis
        run: |
          echo "Running security analysis..."
          security-scan . --report-format sarif --output security-results.sarif || true

      - name: Upload security results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-analysis
          path: security-results.sarif
          retention-days: 30

  # ── Transport conformance -- self-contained build ──
  transport-conformance:
    name: Transport Conformance
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: package
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
      - name: Setup build environment
        uses: ./.github/actions/setup-dotnet-build
        with:
          solution-filter: eng/ci/shards/TestsOnly.slnf

      - name: Run conformance tests
        run: |
          dotnet test tests/conformance/Excalibur.Dispatch.Tests.Conformance/Excalibur.Dispatch.Tests.Conformance.csproj \
            --configuration Release \
            --no-build \
            --blame-hang-timeout 5m \
            --logger "trx;LogFileName=transport-conformance.trx" \
            --logger "console;verbosity=minimal" \
            --results-directory ./TestResults

      - name: Generate transport parity dashboard
        shell: pwsh
        run: |
          ./eng/ci/validate-framework-governance.ps1 -Mode TransportParity -MatrixPath management/governance/framework-governance.json -OutDir management/reports/TransportParityReport -Enforce:$true

      - name: Upload conformance results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: transport-conformance-results
          path: |
            TestResults/*.trx
            management/reports/TransportParityReport

  # ── Release-blocking test governance ──
  release-blocking-tests:
    name: Release-Blocking Test Governance
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [unit-shard-coverage, unit-tests, unit-tests-windows, unit-tests-macos]
    if: always()
    steps:
      - name: Validate release-blocking test matrix
        shell: bash
        run: |
          set -euo pipefail
          require_success() {
            local suite="$1"
            local status="$2"
            if [[ "$status" != "success" ]]; then
              failures+=("${suite}=${status}")
            fi
          }
          failures=()

          shard="${{ needs.unit-shard-coverage.result }}"
          unit="${{ needs.unit-tests.result }}"
          unit_win="${{ needs.unit-tests-windows.result }}"
          unit_mac="${{ needs.unit-tests-macos.result }}"

          echo "## Release-Blocking Test Governance" >> "$GITHUB_STEP_SUMMARY"
          echo "Deterministic blocking tier: core/transport/middleware/excalibur on all platforms. Async-risk (messaging/observability) is advisory." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Suite | Status | Tier |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| unit-shard-coverage | $shard | blocking |" >> "$GITHUB_STEP_SUMMARY"
          echo "| unit-tests-linux (deterministic) | $unit | blocking |" >> "$GITHUB_STEP_SUMMARY"
          echo "| unit-tests-windows (deterministic) | $unit_win | blocking |" >> "$GITHUB_STEP_SUMMARY"
          echo "| unit-tests-macos (deterministic) | $unit_mac | blocking |" >> "$GITHUB_STEP_SUMMARY"

          require_success "unit-shard-coverage" "$shard"
          require_success "unit-tests" "$unit"
          require_success "unit-tests-windows" "$unit_win"
          require_success "unit-tests-macos" "$unit_mac"

          if [ ${#failures[@]} -gt 0 ]; then
            printf '  %s\n' "One or more release-blocking test suites failed: ${failures[*]}" >> "$GITHUB_STEP_SUMMARY"
            echo "One or more release-blocking test suites failed." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "All release-blocking test suites passed." >> "$GITHUB_STEP_SUMMARY"

  # ── Release-blocking CI governance ──
  release-blocking-ci:
    name: Release-Blocking CI Governance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [package, release-blocking-tests, quality, flaky-quarantine-governance, serialization-policy, call-security, call-governance]
    if: always()
    steps:
      - name: Validate release-blocking CI policy
        shell: bash
        run: |
          set -euo pipefail
          require_success() {
            local gate="$1"
            local status="$2"
            if [[ "$status" != "success" ]]; then
              failures+=("${gate}=${status}")
            fi
          }

          failures=()
          pkg="${{ needs.package.result }}"
          test_gate="${{ needs.release-blocking-tests.result }}"
          quality="${{ needs.quality.result }}"
          flaky_quarantine="${{ needs.flaky-quarantine-governance.result }}"
          serialization="${{ needs.serialization-policy.result }}"
          security="${{ needs.call-security.result }}"
          governance="${{ needs.call-governance.result }}"

          echo "## Release-Blocking CI Governance" >> "$GITHUB_STEP_SUMMARY"
          echo "Required tier: deterministic unit tests + static analysis + package integrity + flaky quarantine governance." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Gate | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| package | $pkg |" >> "$GITHUB_STEP_SUMMARY"
          echo "| release-blocking-tests | $test_gate |" >> "$GITHUB_STEP_SUMMARY"
          echo "| quality | $quality |" >> "$GITHUB_STEP_SUMMARY"
          echo "| flaky-quarantine-governance | $flaky_quarantine |" >> "$GITHUB_STEP_SUMMARY"
          echo "| serialization-policy | $serialization |" >> "$GITHUB_STEP_SUMMARY"
          echo "| call-security | $security |" >> "$GITHUB_STEP_SUMMARY"
          echo "| call-governance | $governance |" >> "$GITHUB_STEP_SUMMARY"

          require_success "package" "$pkg"
          require_success "release-blocking-tests" "$test_gate"
          require_success "quality" "$quality"
          require_success "flaky-quarantine-governance" "$flaky_quarantine"
          require_success "serialization-policy" "$serialization"
          require_success "call-security" "$security"
          require_success "call-governance" "$governance"

          if [ ${#failures[@]} -gt 0 ]; then
            printf '  %s\n' "Release-blocking CI policy failed: ${failures[*]}" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "Release-blocking CI policy passed." >> "$GITHUB_STEP_SUMMARY"

  # ── Pack quality gate (report) ──
  pack-quality:
    name: Pack Quality Gate (report)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: package
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      - name: Generate pack quality report
        shell: pwsh
        run: |
          ./eng/ci/pack-report.ps1 -OutDir management/reports/PackReport
      - name: Upload pack report
        uses: actions/upload-artifact@v7
        with:
          name: pack-report
          path: management/reports/PackReport

  # ── Packaging smoke tests ──
  packaging-smoke-tests:
    name: Packaging Smoke Tests (T5.2)
    runs-on: ubuntu-latest
    needs: package
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: .nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Run packaging smoke tests
        shell: pwsh
        run: |
          Write-Host "Running packaging smoke tests..."
          ./eng/smoke-test-packages.ps1
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Packaging smoke tests FAILED" -ForegroundColor Red
            exit 1
          }
          Write-Host "Packaging smoke tests PASSED" -ForegroundColor Green

      - name: Smoke test summary
        if: always()
        run: |
          echo "## Packaging Smoke Tests (T5.2)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Purpose:** Validate Dispatch packages work in isolation without Excalibur" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Packages Tested" >> $GITHUB_STEP_SUMMARY
          echo "- Excalibur.Dispatch" >> $GITHUB_STEP_SUMMARY
          echo "- Excalibur.Dispatch.Abstractions" >> $GITHUB_STEP_SUMMARY
          echo "- Excalibur.Dispatch.Serialization.MemoryPack" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "**Status:** All smoke tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** Smoke tests failed - see logs for details" >> $GITHUB_STEP_SUMMARY
          fi

  # ── CI triage labels (PR only) ──
  triage-labels:
    name: Apply CI Triage Labels
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    needs: [package, unit-tests, integration-tests, call-governance, architecture-tests, serialization-policy, call-security, aot-sample-validation]
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Ensure CI triage labels exist
        uses: actions/github-script@v9
        with:
          script: |
            const labels = [
              { name: 'ci:packability', color: '0e8a16', description: 'Package/packability issues' },
              { name: 'ci:bloat-guard', color: 'b60205', description: 'Transitive bloat violations' },
              { name: 'ci:netarchtest', color: '5319e7', description: 'Architecture tests violations' },
              { name: 'ci:api-compat', color: '1d76db', description: 'API compatibility issues' },
              { name: 'ci:trim-aot', color: 'fbca04', description: 'Trim/AOT validation issues' },
              { name: 'ci:r014-boundary', color: 'd93f0b', description: 'Serialization boundary (R0.14) issues' },
              { name: 'sec:cve', color: 'b60205', description: 'Security CVE findings' }
            ];
            for (const l of labels) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: l.name });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name: l.name, color: l.color, description: l.description });
                } else {
                  throw e;
                }
              }
            }

      - name: Apply labels based on CI job results
        uses: actions/github-script@v9
        with:
          script: |
            const labels = [];
            const needs = {
              package: '${{ needs.package.result }}',
              unitTests: '${{ needs.unit-tests.result }}',
              integrationTests: '${{ needs.integration-tests.result }}',
              governance: '${{ needs.call-governance.result }}',
              architectureTests: '${{ needs.architecture-tests.result }}',
              serializationPolicy: '${{ needs.serialization-policy.result }}',
              security: '${{ needs.call-security.result }}',
              aotValidation: '${{ needs.aot-sample-validation.result }}'
            };
            if (needs.package !== 'success') labels.push('ci:packability');
            if (needs.governance !== 'success') labels.push('ci:bloat-guard');
            if (needs.architectureTests !== 'success' && needs.architectureTests !== 'skipped') labels.push('ci:netarchtest');
            if (needs.serializationPolicy !== 'success' && needs.serializationPolicy !== 'skipped') labels.push('ci:r014-boundary');
            if (needs.security !== 'success' && needs.security !== 'skipped') labels.push('sec:cve');
            if (needs.aotValidation !== 'success' && needs.aotValidation !== 'skipped') labels.push('ci:trim-aot');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels
              });
            }

  # ── Sample certification validation ──
  sample-validation:
    name: Sample Certification Validation (T3.4)
    runs-on: ubuntu-latest
    needs: package
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: .nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Run sample validation
        shell: pwsh
        run: |
          Write-Host "Running sample certification validation (build + smoke profiles)..."
          ./eng/validate-samples.ps1 -SkipRestore
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Sample validation FAILED" -ForegroundColor Red
            exit 1
          }
          Write-Host "Sample validation PASSED" -ForegroundColor Green

      - name: Sample validation summary
        if: always()
        run: |
          echo "## Sample Certification Validation (T3.4)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Purpose:** Validate certified samples from governance matrix with build + smoke profiles" >> $GITHUB_STEP_SUMMARY
          echo "**Source of truth:** management/governance/framework-governance.json (sampleFitness)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "**Status:** Certified sample set build/smoke validation passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** Sample validation failed - see logs for details" >> $GITHUB_STEP_SUMMARY
          fi

  # ── AOT sample validation ──
  aot-sample-validation:
    name: AOT Sample Validation (S462.4)
    runs-on: ubuntu-latest
    needs: [package, sample-validation]
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: .nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore samples/10-aot/Excalibur.Dispatch.Aot.Sample/Excalibur.Dispatch.Aot.Sample.csproj

      - name: Build AOT sample (Release)
        run: |
          echo "Building AOT sample with source generators..."
          dotnet build samples/10-aot/Excalibur.Dispatch.Aot.Sample/Excalibur.Dispatch.Aot.Sample.csproj \
            --configuration Release \
            --no-restore \
            -p:TreatWarningsAsErrors=true \
            2>&1 | tee aot-build-output.txt
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "AOT sample build FAILED"
            exit 1
          fi
          echo "AOT sample build succeeded"

      - name: Verify AOT publish configuration
        run: |
          echo "Verifying AOT/trimming configuration..."
          if ! grep -q '<PublishAot>true</PublishAot>' samples/10-aot/Excalibur.Dispatch.Aot.Sample/Excalibur.Dispatch.Aot.Sample.csproj; then
            echo "PublishAot not enabled in project file"
            exit 1
          fi
          if ! grep -q '<TrimMode>full</TrimMode>' samples/10-aot/Excalibur.Dispatch.Aot.Sample/Excalibur.Dispatch.Aot.Sample.csproj; then
            echo "TrimMode not set to full"
            exit 1
          fi
          echo "AOT configuration verified"

      - name: Check for trimming/AOT warnings
        run: |
          echo "Checking for trimming/AOT warnings..."
          TRIM_WARNINGS=$(grep -E "(IL2\d{3}|IL3\d{3}|trim|Trim|RequiresUnreferencedCode|DynamicallyAccessedMembers)" aot-build-output.txt | wc -l || true)
          echo "Trimming-related warnings found: $TRIM_WARNINGS"
          echo "AOT_WARNINGS=$TRIM_WARNINGS" >> $GITHUB_ENV
          if [ "$TRIM_WARNINGS" -gt 0 ]; then
            echo "Found $TRIM_WARNINGS trimming-related warnings"
            grep -E "(IL2\d{3}|IL3\d{3}|trim|Trim|RequiresUnreferencedCode|DynamicallyAccessedMembers)" aot-build-output.txt || true
          else
            echo "No trimming warnings found in sample code"
          fi

      - name: Run AOT sample (smoke test)
        run: |
          echo "Running AOT sample as smoke test..."
          timeout 30 dotnet run --project samples/10-aot/Excalibur.Dispatch.Aot.Sample/Excalibur.Dispatch.Aot.Sample.csproj \
            --configuration Release \
            --no-build || true
          echo "AOT sample smoke test completed"

      - name: Upload build output on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: aot-sample-build-output
          path: aot-build-output.txt
          retention-days: 7

      - name: AOT sample validation summary
        if: always()
        run: |
          echo "## AOT Sample Validation (S462.4)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Purpose:** Validate Native AOT sample builds and runs with source generators" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Configuration Verified" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| PublishAot | true |" >> $GITHUB_STEP_SUMMARY
          echo "| TrimMode | full |" >> $GITHUB_STEP_SUMMARY
          echo "| JsonSerializerIsReflectionEnabledByDefault | false |" >> $GITHUB_STEP_SUMMARY
          echo "| Interceptors | Excalibur.Dispatch.Generated |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Source Generators Demonstrated" >> $GITHUB_STEP_SUMMARY
          echo "- HandlerRegistrySourceGenerator" >> $GITHUB_STEP_SUMMARY
          echo "- MessageTypeSourceGenerator" >> $GITHUB_STEP_SUMMARY
          echo "- HandlerActivationGenerator" >> $GITHUB_STEP_SUMMARY
          echo "- DispatchInterceptorGenerator" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Results" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ job.status == 'success' && 'PASS' || 'FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| AOT Config | ${{ job.status == 'success' && 'Verified' || 'Issues' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trim Warnings | ${{ env.AOT_WARNINGS || '0' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "**Status:** AOT sample builds successfully with source generators" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** AOT sample validation failed - see logs for details" >> $GITHUB_STEP_SUMMARY
          fi

  # ── CI Summary ──
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [package, smoke-tests, unit-shard-coverage, unit-tests, unit-tests-windows, unit-tests-macos, integration-tests, functional-tests, contract-tests, architecture-tests, transport-conformance, flaky-quarantine-governance, flaky-tests-quarantine, release-blocking-tests, release-blocking-ci, quality, call-coverage, call-security, call-governance, call-performance, serialization-policy, sample-validation, aot-sample-validation, documentation-validation]
    if: always()
    steps:
      - name: Generate CI summary
        run: |
          echo "# Continuous Integration Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow:** ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Job Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Package | ${{ needs.package.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests (Priority=0) | ${{ needs.smoke-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Shard Coverage | ${{ needs.unit-shard-coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests (Linux) | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests (Windows) | ${{ needs.unit-tests-windows.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests (macOS) | ${{ needs.unit-tests-macos.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Flaky Quarantine Governance | ${{ needs.flaky-quarantine-governance.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Flaky Quarantine Suite (Non-blocking) | ${{ needs.flaky-tests-quarantine.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release-Blocking Test Gate | ${{ needs.release-blocking-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release-Blocking CI Gate | ${{ needs.release-blocking-ci.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Quality | ${{ needs.quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${{ needs.call-coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scanning | ${{ needs.call-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Governance | ${{ needs.call-governance.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Serialization Policy (R0.14) | ${{ needs.serialization-policy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Sample Validation (T3.4) | ${{ needs.sample-validation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| AOT Sample Validation (S462.4) | ${{ needs.aot-sample-validation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation Verification (T5.4) | ${{ needs.documentation-validation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Performance Gates | ${{ needs.call-performance.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.release-blocking-ci.result }}" = "success" ]; then
            echo "**All critical checks passed!** Ready for merge." >> $GITHUB_STEP_SUMMARY
          else
            echo "**Some checks failed.** Please review the results above." >> $GITHUB_STEP_SUMMARY
          fi

  # ── Test result trend reporting ──
  test-result-reporter:
    name: Test Result Reporter (${{ matrix.report.name }})
    runs-on: ubuntu-latest
    needs: [unit-tests, unit-tests-async-risk, integration-tests]
    if: always()
    continue-on-error: true
    permissions:
      contents: read
      checks: write
      pull-requests: write
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        report:
          - { name: unit-core, artifact: test-results-unit-core, path: "**/*.trx" }
          - { name: unit-transport, artifact: test-results-unit-transport, path: "**/*.trx" }
          - { name: unit-middleware, artifact: test-results-unit-middleware, path: "**/*.trx" }
          - { name: unit-excalibur, artifact: test-results-unit-excalibur, path: "**/*.trx" }
          - { name: unit-observability, artifact: test-results-unit-async-risk-observability, path: "**/*.trx" }
          - { name: unit-async-risk-messaging, artifact: test-results-unit-async-risk-messaging, path: "**/*.trx" }
          - { name: integration, artifact: test-results-integration, path: "**/*.trx" }
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1

      - name: Trust workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Download test results
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.report.artifact }}
          path: test-results
        continue-on-error: true

      - name: Publish test results
        if: hashFiles('test-results/**/*.trx') != ''
        uses: dorny/test-reporter@v3
        with:
          name: "Test Results - ${{ matrix.report.name }}"
          path: "test-results/${{ matrix.report.path }}"
          reporter: dotnet-trx
          fail-on-error: false
