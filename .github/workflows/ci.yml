  triage-labels:
    name: Apply CI Triage Labels
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [build, unit-tests, integration-tests, call-governance, architecture-tests, serialization-policy, call-security, aot-sample-validation]
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Ensure CI triage labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'ci:packability', color: '0e8a16', description: 'Package/packability issues' },
              { name: 'ci:bloat-guard', color: 'b60205', description: 'Transitive bloat violations' },
              { name: 'ci:netarchtest', color: '5319e7', description: 'Architecture tests violations' },
              { name: 'ci:api-compat', color: '1d76db', description: 'API compatibility issues' },
              { name: 'ci:trim-aot', color: 'fbca04', description: 'Trim/AOT validation issues' },
              { name: 'ci:r014-boundary', color: 'd93f0b', description: 'Serialization boundary (R0.14) issues' },
              { name: 'sec:cve', color: 'b60205', description: 'Security CVE findings' }
            ];
            for (const l of labels) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: l.name });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name: l.name, color: l.color, description: l.description });
                } else {
                  throw e;
                }
              }
            }

      - name: Apply labels based on CI job results
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [];
            const needs = context.payload.workflow_run ? {} : {
              build: '${{ needs.build.result }}',
              unitTests: '${{ needs.unit-tests.result }}',
              integrationTests: '${{ needs.integration-tests.result }}',
              governance: '${{ needs.call-governance.result }}',
              architectureTests: '${{ needs.architecture-tests.result }}',
              serializationPolicy: '${{ needs.serialization-policy.result }}',
              security: '${{ needs.call-security.result }}',
              aotValidation: '${{ needs.aot-sample-validation.result }}'
            };
            if (needs.build !== 'success') labels.push('ci:packability');
            if (needs.governance !== 'success') labels.push('ci:bloat-guard');
            if (needs.architectureTests !== 'success' && needs.architectureTests !== 'skipped') labels.push('ci:netarchtest');
            if (needs.serializationPolicy !== 'success' && needs.serializationPolicy !== 'skipped') labels.push('ci:r014-boundary');
            if (needs.security !== 'success' && needs.security !== 'skipped') labels.push('sec:cve');
            if (needs.aotValidation !== 'success' && needs.aotValidation !== 'skipped') labels.push('ci:trim-aot');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels
              });
            }

