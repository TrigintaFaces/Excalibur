name: Continuous Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      run_performance_tests:
        description: 'Run performance regression tests'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  COVERAGE_THRESHOLD: 65

jobs:
  # Build validation across multiple platforms
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            runtime: linux-x64
          - os: windows-latest
            runtime: win-x64
          - os: macos-latest
            runtime: osx-x64
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
          fetch-depth: 1

      - name: Free disk space (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          echo "Disk usage before cleanup:"
          df -h
          sudo rm -rf /usr/share/swift || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /home/linuxbrew || true
          sudo rm -rf /usr/local/.ghcup || true
          sudo rm -rf /usr/local/share/boost || true
          sudo apt-get clean || true
          docker system prune -af || true
          echo "Disk usage after cleanup:"
          df -h

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: .nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore eng/ci/shards/ShippingOnly.slnf --verbosity quiet

      - name: Build solution
        run: dotnet build eng/ci/shards/ShippingOnly.slnf --configuration Release --no-restore --verbosity quiet

      - name: Deterministic build validation (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "Validating deterministic builds with CI flag..."
          dotnet build eng/ci/shards/ShippingOnly.slnf --configuration Release --no-restore -p:CI=true --verbosity quiet
          echo "✅ Deterministic build validation successful (Sprint 318 T3.4 AD-318-3)"

      - name: Package validation (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "Validating packageable projects..."
          dotnet pack eng/ci/shards/ShippingOnly.slnf --configuration Release --no-build --verbosity minimal --output ./packages
          echo "✅ Package creation successful"

      - name: Upload build artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            ./packages/*.nupkg
            ./packages/*.snupkg
          retention-days: 1

  # Security scanning (reusable workflow)
  call-security:
    needs: build
    uses: ./.github/workflows/security.yml
    with:
      checkout-ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      checkout-token: ${{ github.token }}
      event-name: ${{ github.event_name }}
    secrets: inherit

  # Governance validation (reusable workflow)
  call-governance:
    needs: build
    uses: ./.github/workflows/governance.yml
    with:
      checkout-ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      checkout-token: ${{ github.token }}
      event-name: ${{ github.event_name }}
    secrets: inherit

  # Sprint 461 T5.4: Documentation Verification in CI (AD-461-1)
  documentation-validation:
    name: Documentation Verification (T5.4)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        working-directory: docs-site
        run: npm ci

      - name: TypeScript check
        working-directory: docs-site
        run: npm run typecheck

      - name: Validate version-safe docs links
        working-directory: docs-site
        run: npm run validate:version-links

      - name: Build Docusaurus (enforcing zero warnings)
        working-directory: docs-site
        env:
          # Set CI mode to enforce strict link checking
          CI: true
          DOCUSAURUS_STRICT_LINKS: true
        run: |
          echo "🔍 Building Docusaurus with strict link validation..."

          # Build and capture output for analysis
          npm run build 2>&1 | tee build-output.txt
          BUILD_EXIT_CODE=${PIPESTATUS[0]}

          # Count warnings in the output
          WARNING_COUNT=$(grep -c -E "(warning|Warning|⚠)" build-output.txt || true)

          echo "Build exit code: $BUILD_EXIT_CODE"
          echo "Warning count: $WARNING_COUNT"

          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "❌ Docusaurus build FAILED"
            exit 1
          fi

          # For now, report warnings but don't fail
          # After Sprint 461, we can enable strict mode
          if [ "$WARNING_COUNT" -gt 0 ]; then
            echo "⚠️ Found $WARNING_COUNT warnings in Docusaurus build"
            echo "DOCS_WARNINGS=$WARNING_COUNT" >> $GITHUB_ENV
          else
            echo "✅ Docusaurus build completed with zero warnings"
            echo "DOCS_WARNINGS=0" >> $GITHUB_ENV
          fi

      - name: Verify build output exists
        run: |
          if [ ! -d "docs-site/build" ]; then
            echo "❌ Build output directory not found"
            exit 1
          fi

          # Count built files
          FILE_COUNT=$(find docs-site/build -name "*.html" | wc -l)
          echo "✅ Built $FILE_COUNT HTML pages"

          if [ "$FILE_COUNT" -lt 10 ]; then
            echo "❌ Build appears incomplete (less than 10 HTML pages)"
            exit 1
          fi

      - name: Upload build output for inspection
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docs-build-output
          path: docs-site/build-output.txt
          retention-days: 7

      - name: Documentation validation summary
        if: always()
        run: |
          echo "## 📚 Documentation Verification (T5.4)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Sprint:** 461" >> $GITHUB_STEP_SUMMARY
          echo "**Task:** T5.4 - Documentation Verification in CI" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript Check | ${{ job.status == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docusaurus Build | ${{ job.status == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Warnings | ${{ env.DOCS_WARNINGS || '0' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ **Documentation verification passed**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Documentation verification failed** - see logs for details" >> $GITHUB_STEP_SUMMARY
          fi

  # Smoke tests - critical path tests for immediate PR feedback (Priority=0)
  smoke-tests:
    name: Smoke Tests (Critical Path)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: .nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore eng/ci/shards/TestsOnly.slnf

      - name: Build solution
        run: dotnet build eng/ci/shards/TestsOnly.slnf --configuration Release --no-restore

      - name: Run Smoke Tests (Priority=0)
        run: |
          echo "Running critical path smoke tests..."
          dotnet test eng/ci/shards/TestsOnly.slnf \
            --configuration Release \
            --no-build \
            --blame-hang-timeout 5m \
            --logger "trx;LogFileName=smoke-tests.trx" \
            --logger "console;verbosity=minimal" \
            --results-directory ./TestResults \
            --filter "Priority=0" \
            -- RunConfiguration.TestSessionTimeout=300000
          echo "✅ Smoke tests completed"

      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-smoke
          path: TestResults/*.trx
          retention-days: 7

  # Unit tests - sharded across 6 solution filters for parallel execution
  unit-shard-coverage:
    name: Unit Shard Coverage Audit
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Validate unit-test shard coverage
        shell: pwsh
        run: |
          ./eng/ci/validate-unit-shards.ps1 -OutDir management/reports/UnitShardReport -Enforce $true

      - name: Upload shard coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-shard-coverage-report
          path: management/reports/UnitShardReport
          retention-days: 14

  # Unit tests - sharded across 6 solution filters for parallel execution
  unit-tests:
    name: Unit Tests (${{ matrix.shard.name }})
    runs-on: ubuntu-latest
    needs: [build, smoke-tests, unit-shard-coverage]
    timeout-minutes: 15
    strategy:
      matrix:
        shard:
          - { name: core, filter: "eng/ci/shards/UnitTests-Core.slnf", test_filter: "(Category=Unit|Category=DependencyInjection)&Category!=Performance" }
          - { name: transport, filter: "eng/ci/shards/UnitTests-Transport.slnf", test_filter: "(Category=Unit|Category=DependencyInjection)&Category!=Performance" }
          - { name: middleware, filter: "eng/ci/shards/UnitTests-Middleware.slnf", test_filter: "(Category=Unit|Category=DependencyInjection)&Category!=Performance" }
          - { name: excalibur, filter: "eng/ci/shards/UnitTests-Excalibur.slnf", test_filter: "(Category=Unit|Category=DependencyInjection)&Category!=Performance" }
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: .nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ${{ matrix.shard.filter }}

      - name: Build shard
        run: dotnet build ${{ matrix.shard.filter }} --configuration Release --no-restore

      - name: Compose unit test filter
        shell: pwsh
        run: |
          $filterInfo = ./eng/ci/get-test-filter.ps1 -BaseFilter '${{ matrix.shard.test_filter }}' -Mode Exclude -AsJson | ConvertFrom-Json
          "UNIT_TEST_FILTER=$($filterInfo.filter)" >> $env:GITHUB_ENV
          "UNIT_QUARANTINE_COUNT=$($filterInfo.count)" >> $env:GITHUB_ENV
          Write-Host "Using unit test filter with $($filterInfo.count) quarantined exclusions."

      - name: Run Unit Tests
        run: |
          dotnet test ${{ matrix.shard.filter }} \
            --configuration Release \
            --no-build \
            --blame-hang-timeout 5m \
            --logger "trx;LogFileName=unit-tests-${{ matrix.shard.name }}.trx" \
            --logger "console;verbosity=minimal" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --filter "${{ env.UNIT_TEST_FILTER }}" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-unit-${{ matrix.shard.name }}
          path: TestResults/*.trx
          retention-days: 30

      - name: Upload code coverage
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-unit-${{ matrix.shard.name }}
          path: TestResults/*/coverage.cobertura.xml
          if-no-files-found: error
          retention-days: 30

  # Async-risk unit tests (messaging, observability) -- advisory on PRs, blocking on push to main
  unit-tests-async-risk:
    name: Unit Tests - Async Risk (${{ matrix.shard.name }})
    runs-on: ubuntu-latest
    needs: [build, smoke-tests, unit-shard-coverage]
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    timeout-minutes: 15
    strategy:
      matrix:
        shard:
          - { name: messaging, filter: "eng/ci/shards/UnitTests-Messaging.slnf", test_filter: "(Category=Unit|Category=DependencyInjection)&Category!=Performance" }
          - { name: observability, filter: "eng/ci/shards/UnitTests-Observability.slnf", test_filter: "(Category=Unit|Category=DependencyInjection)&Category!=Performance" }
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: .nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ${{ matrix.shard.filter }}

      - name: Build shard
        run: dotnet build ${{ matrix.shard.filter }} --configuration Release --no-restore

      - name: Compose unit test filter
        shell: pwsh
        run: |
          $filterInfo = ./eng/ci/get-test-filter.ps1 -BaseFilter '${{ matrix.shard.test_filter }}' -Mode Exclude -AsJson | ConvertFrom-Json
          "UNIT_TEST_FILTER=$($filterInfo.filter)" >> $env:GITHUB_ENV
          "UNIT_QUARANTINE_COUNT=$($filterInfo.count)" >> $env:GITHUB_ENV
          Write-Host "Using unit test filter with $($filterInfo.count) quarantined exclusions."

      - name: Run Unit Tests
        run: |
          dotnet test ${{ matrix.shard.filter }} \
            --configuration Release \
            --no-build \
            --blame-hang-timeout 5m \
            --logger "trx;LogFileName=unit-tests-async-risk-${{ matrix.shard.name }}.trx" \
            --logger "console;verbosity=minimal" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --filter "${{ env.UNIT_TEST_FILTER }}" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-unit-async-risk-${{ matrix.shard.name }}
          path: TestResults/*.trx
          retention-days: 30

      - name: Upload code coverage
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-unit-async-risk-${{ matrix.shard.name }}
          path: TestResults/*/coverage.cobertura.xml
          if-no-files-found: error
          retention-days: 30

  # Cross-platform unit test validation (Windows) -- Deterministic blocking tier
  unit-tests-windows:
    name: Unit Tests (Windows - Deterministic)
    runs-on: windows-latest
    needs: [build, smoke-tests, unit-shard-coverage]
    timeout-minutes: 60
    env:
      VSTEST_CONNECTION_TIMEOUT: 300
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: .nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore eng/ci/shards/UnitTests-Deterministic.slnf

      - name: Build solution
        run: dotnet build eng/ci/shards/UnitTests-Deterministic.slnf --configuration Release --no-restore

      - name: Compose Windows unit test filter
        shell: pwsh
        run: |
          $baseFilter = '(Category=Unit|Category=DependencyInjection)&Category!=Performance'
          $filterInfo = ./eng/ci/get-test-filter.ps1 -BaseFilter $baseFilter -Mode Exclude -AsJson | ConvertFrom-Json
          "WINDOWS_UNIT_TEST_FILTER=$($filterInfo.filter)" >> $env:GITHUB_ENV
          Write-Host "Using Windows unit filter with $($filterInfo.count) quarantined exclusions."

      - name: Run Unit Tests
        run: |
          dotnet test eng/ci/shards/UnitTests-Deterministic.slnf --configuration Release --no-build --blame-hang-timeout 5m --logger "trx;LogFileName=unit-tests-windows-deterministic.trx" --logger "console;verbosity=minimal" --results-directory ./TestResults --filter "${{ env.WINDOWS_UNIT_TEST_FILTER }}" -- RunConfiguration.TestSessionTimeout=1500000

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-unit-windows-deterministic
          path: TestResults/*.trx
          retention-days: 30

  # Cross-platform unit test validation (Windows) -- Async-risk advisory tier
  unit-tests-windows-async-risk:
    name: Unit Tests (Windows - Async Risk)
    runs-on: windows-latest
    needs: [build, smoke-tests, unit-shard-coverage]
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    timeout-minutes: 60
    env:
      VSTEST_CONNECTION_TIMEOUT: 300
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: .nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore eng/ci/shards/UnitTests-AsyncRisk.slnf

      - name: Build solution
        run: dotnet build eng/ci/shards/UnitTests-AsyncRisk.slnf --configuration Release --no-restore

      - name: Compose Windows unit test filter
        shell: pwsh
        run: |
          $baseFilter = '(Category=Unit|Category=DependencyInjection)&Category!=Performance'
          $filterInfo = ./eng/ci/get-test-filter.ps1 -BaseFilter $baseFilter -Mode Exclude -AsJson | ConvertFrom-Json
          "WINDOWS_UNIT_TEST_FILTER=$($filterInfo.filter)" >> $env:GITHUB_ENV
          Write-Host "Using Windows unit filter with $($filterInfo.count) quarantined exclusions."

      - name: Run Unit Tests
        run: |
          dotnet test eng/ci/shards/UnitTests-AsyncRisk.slnf -m:1 --configuration Release --no-build --blame-hang-timeout 5m --logger "trx;LogFilePrefix=unit-tests-windows-async-risk" --logger "console;verbosity=minimal" --results-directory ./TestResults --filter "${{ env.WINDOWS_UNIT_TEST_FILTER }}" -- RunConfiguration.TestSessionTimeout=1500000 RunConfiguration.MaxCpuCount=1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-unit-windows-async-risk
          path: TestResults/*.trx
          retention-days: 30

  # Integration tests - depends on unit tests (fail-fast)
  integration-tests:
    name: Integration Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: unit-tests
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    timeout-minutes: 60
    strategy:
      matrix:
        os: [ubuntu-latest]
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: .nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore eng/ci/shards/IntegrationTests.slnf

      - name: Build solution
        run: dotnet build eng/ci/shards/IntegrationTests.slnf --configuration Release --no-restore

      - name: Integration preflight diagnostics
        shell: pwsh
        run: |
          Write-Host "Runner OS: $env:RUNNER_OS"
          Write-Host "DOTNET_ROOT: $env:DOTNET_ROOT"
          Write-Host "GITHUB_ACTIONS: $env:GITHUB_ACTIONS"
          Write-Host "Docker command available: $([bool](Get-Command docker -ErrorAction SilentlyContinue))"
          if (Get-Command docker -ErrorAction SilentlyContinue) {
            docker --version
          }

          foreach ($name in @('AZURE_KEYVAULT_URI', 'COSMOS_EMULATOR_ENDPOINT')) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              Write-Host ("{0}: not set" -f $name)
            }
            else {
              Write-Host ("{0}: set" -f $name)
            }
          }

      - name: Verify XPlat coverage collector package
        shell: bash
        run: |
          set -euo pipefail
          dotnet list tests/integration/Excalibur.Dispatch.Integration.Tests/Excalibur.Dispatch.Integration.Tests.csproj package --include-transitive | tee integration-packages.log
          if ! grep -qi "coverlet\\.collector" integration-packages.log; then
            echo "::error::coverlet.collector package is unavailable for integration tests (XPlat Code Coverage collector)."
            exit 1
          fi

      - name: Compose integration test filter
        shell: pwsh
        run: |
          $baseFilter = 'Category=Integration|Category=EndToEnd'
          $filterInfo = ./eng/ci/get-test-filter.ps1 -BaseFilter $baseFilter -Mode Exclude -AsJson | ConvertFrom-Json
          "INTEGRATION_TEST_FILTER=$($filterInfo.filter)" >> $env:GITHUB_ENV
          Write-Host "Using integration filter with $($filterInfo.count) quarantined exclusions."

      - name: Run Integration Tests
        run: |
          dotnet test eng/ci/shards/IntegrationTests.slnf \
            -m:1 \
            --configuration Release \
            --no-build \
            --blame-hang-timeout 10m \
            --logger "trx;LogFilePrefix=integration-tests-${{ matrix.os }}" \
            --logger "console;verbosity=minimal" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --filter "${{ env.INTEGRATION_TEST_FILTER }}" \
            -- RunConfiguration.TestSessionTimeout=3600000 DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-integration-${{ matrix.os }}
          path: TestResults/*.trx
          retention-days: 30

      - name: Upload code coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-integration-${{ matrix.os }}
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn
          retention-days: 30

  # Functional tests - depends on integration tests (advisory on PRs, blocking on push to main)
  functional-tests:
    name: Functional Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: .nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore eng/ci/shards/TestsOnly.slnf

      - name: Build solution
        run: dotnet build eng/ci/shards/TestsOnly.slnf --configuration Release --no-restore

      - name: Run Functional Tests
        run: |
          dotnet test eng/ci/shards/TestsOnly.slnf \
            --configuration Release \
            --no-build \
            --blame-hang-timeout 5m \
            --logger "trx;LogFileName=functional-tests.trx" \
            --logger "console;verbosity=minimal" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --filter "Category=Functional" \
            -- RunConfiguration.TestSessionTimeout=1800000 DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-functional
          path: TestResults/*.trx
          retention-days: 30

      - name: Upload code coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-functional
          path: TestResults/*/coverage.cobertura.xml
          if-no-files-found: error
          retention-days: 30

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: .nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore tests/contract/Excalibur.Dispatch.Contract.Tests/Excalibur.Dispatch.Contract.Tests.csproj

      - name: Build contract tests
        run: dotnet build tests/contract/Excalibur.Dispatch.Contract.Tests/Excalibur.Dispatch.Contract.Tests.csproj --configuration Release --no-restore

      - name: Run contract tests
        run: |
          dotnet test tests/contract/Excalibur.Dispatch.Contract.Tests/Excalibur.Dispatch.Contract.Tests.csproj \
            --configuration Release \
            --no-build \
            --blame-hang-timeout 5m \
            --logger "trx;LogFileName=contract-tests.trx" \
            --logger "console;verbosity=minimal" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload contract test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-contract
          path: TestResults/*.trx
          retention-days: 30

      - name: Upload code coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-contract
          path: TestResults/*/coverage.cobertura.xml
          if-no-files-found: error
          retention-days: 30

  architecture-tests:
    name: Architecture Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: .nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore eng/ci/shards/TestsOnly.slnf

      - name: Build architecture tests
        run: dotnet build eng/ci/shards/TestsOnly.slnf --configuration Release --no-restore

      - name: Run architecture test projects
        run: |
          dotnet test tests/architecture/Boundary.Tests/Boundary.Tests.csproj \
            --configuration Release \
            --no-build \
            --blame-hang-timeout 5m \
            --logger "trx;LogFileName=boundary-tests.trx" \
            --logger "console;verbosity=minimal" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload architecture test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-architecture
          path: TestResults/*.trx
          retention-days: 30

      - name: Upload code coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-architecture
          path: TestResults/*/coverage.cobertura.xml
          if-no-files-found: error
          retention-days: 30

  flaky-quarantine-governance:
    name: Flaky Quarantine Governance
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Validate flaky quarantine policy
        shell: pwsh
        run: |
          ./eng/ci/validate-flaky-quarantine.ps1 -OutDir management/reports/FlakyQuarantineReport -Enforce:$true

      - name: Upload quarantine governance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flaky-quarantine-report
          path: management/reports/FlakyQuarantineReport
          retention-days: 30

  flaky-tests-quarantine:
    name: Flaky Tests Quarantine (Non-blocking)
    runs-on: ubuntu-latest
    needs: [build, flaky-quarantine-governance]
    if: always()
    continue-on-error: true
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: .nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Compose quarantined test filter
        shell: pwsh
        run: |
          $filterInfo = ./eng/ci/get-test-filter.ps1 -Mode Include -AsJson | ConvertFrom-Json
          "FLAKY_TEST_FILTER=$($filterInfo.filter)" >> $env:GITHUB_ENV
          "FLAKY_TEST_COUNT=$($filterInfo.count)" >> $env:GITHUB_ENV
          if ([int]$filterInfo.count -eq 0) {
            "## Flaky Tests Quarantine" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "No tests are currently quarantined." >> $env:GITHUB_STEP_SUMMARY
          }
          else {
            Write-Host "Running $($filterInfo.count) quarantined tests."
          }

      - name: Restore dependencies
        if: env.FLAKY_TEST_COUNT != '0'
        run: dotnet restore eng/ci/shards/TestsOnly.slnf

      - name: Build tests
        if: env.FLAKY_TEST_COUNT != '0'
        run: dotnet build eng/ci/shards/TestsOnly.slnf --configuration Release --no-restore

      - name: Run quarantined tests
        if: env.FLAKY_TEST_COUNT != '0'
        run: |
          dotnet test eng/ci/shards/TestsOnly.slnf \
            --configuration Release \
            --no-build \
            --blame-hang-timeout 5m \
            --logger "trx;LogFileName=flaky-quarantine.trx" \
            --logger "console;verbosity=minimal" \
            --results-directory ./TestResults \
            --filter "${{ env.FLAKY_TEST_FILTER }}"

      - name: Upload quarantined test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-flaky-quarantine
          path: TestResults/*.trx
          if-no-files-found: warn
          retention-days: 30

  serialization-policy:
    name: Serialization Policy Validation (R0.14)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      - name: Validate Serializer Policy
        shell: pwsh
        run: |
          Write-Host "🔍 Validating serializer policy (R0.14, R20.24-26)..."
          ./eng/validate-serializer-policy.ps1
          if ($LASTEXITCODE -ne 0) {
            Write-Host "❌ Serializer policy validation FAILED" -ForegroundColor Red
            exit 1
          }
          Write-Host "✅ Serializer policy validation PASSED" -ForegroundColor Green
      - name: Run serialization boundary audit (extended report)
        shell: pwsh
        run: |
          ./eng/ci/serialization-boundary-audit.ps1 -OutDir management/reports/SerializationBoundaryReport
      - name: Upload serialization boundary report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serialization-boundary-report
          path: management/reports/SerializationBoundaryReport

  aot-build-analysis:
    name: AOT Build Analysis (report-only)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      - name: Run trim/AOT audit
        shell: pwsh
        run: |
          ./eng/ci/Invoke-AotBuildAnalysis.ps1 -OutputPath management/reports/AotBuildAnalysis
      - name: Upload trim/AOT audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aot-build-analysis
          path: management/reports/AotBuildAnalysis

  # Coverage analysis (reusable workflow)
  call-coverage:
    needs:
      - unit-tests
      - integration-tests
      - functional-tests
      - contract-tests
      - architecture-tests
    if: always()
    uses: ./.github/workflows/coverage.yml
    with:
      checkout-ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      checkout-token: ${{ github.token }}
      event-name: ${{ github.event_name }}
      coverage-threshold: '65'
      pr-base-sha: ${{ github.event.pull_request.base.sha || '' }}
      pr-number: ${{ github.event.pull_request.number || '' }}
    secrets: inherit

  # Performance gates (reusable workflow)
  call-performance:
    needs: build
    uses: ./.github/workflows/performance.yml
    with:
      checkout-ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      checkout-token: ${{ github.token }}
      run-performance-tests: ${{ github.event.inputs.run_performance_tests == 'true' || github.event_name == 'push' }}
    secrets: inherit

  # Code quality and security analysis
  quality:
    name: Quality Analysis
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
          fetch-depth: 1

      - name: Free disk space (Ubuntu)
        shell: bash
        run: |
          set -euo pipefail
          echo "Disk usage before cleanup:"
          df -h
          sudo rm -rf /usr/share/swift || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /home/linuxbrew || true
          sudo rm -rf /usr/local/.ghcup || true
          sudo rm -rf /usr/local/share/boost || true
          sudo apt-get clean || true
          docker system prune -af || true
          echo "Disk usage after cleanup:"
          df -h

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: .nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore eng/ci/shards/ShippingOnly.slnf --verbosity quiet

      - name: Build solution
        run: dotnet build eng/ci/shards/ShippingOnly.slnf --configuration Release --no-restore --verbosity quiet

      - name: Scan for vulnerable packages (R20.10)
        run: |
          echo "🔍 Scanning for vulnerable NuGet packages..."
          pwsh -File eng/scan-vulnerabilities.ps1

      - name: Validate serialization policy (R0.14, R20.24-26)
        run: |
          echo "🔍 Validating serialization policy..."
          pwsh -File eng/validate-serializer-policy.ps1

      - name: Validate architecture boundaries (R1.9, R17.8)
        run: |
          echo "🔍 Validating architecture boundaries..."
          pwsh -File eng/validate-architecture-boundaries.ps1

      - name: Install security scan tools
        run: |
          dotnet tool install --global security-scan --version 5.6.7 || true
          dotnet tool install --global dotnet-sonarscanner --version 6.2.0 || true

      - name: Run security analysis
        run: |
          echo "Running security analysis..."
          security-scan . --report-format sarif --output security-results.sarif || true

      - name: Upload security results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-analysis
          path: security-results.sarif
          retention-days: 30

  # Code coverage analysis
  # Final validation and summary
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [build, smoke-tests, unit-shard-coverage, unit-tests, unit-tests-windows, integration-tests, functional-tests, contract-tests, architecture-tests, transport-conformance, flaky-quarantine-governance, flaky-tests-quarantine, release-blocking-tests, release-blocking-ci, quality, call-coverage, call-security, call-governance, call-performance, serialization-policy, sample-validation, aot-sample-validation, documentation-validation]
    if: always()
    steps:
      - name: Generate CI summary
        run: |
          echo "# 🚀 Continuous Integration Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow:** ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Job Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result == 'success' && '✅' || '❌' }} ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests (Priority=0) | ${{ needs.smoke-tests.result == 'success' && '✅' || '❌' }} ${{ needs.smoke-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Shard Coverage | ${{ needs.unit-shard-coverage.result == 'success' && '✅' || '❌' }} ${{ needs.unit-shard-coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result == 'success' && '✅' || '❌' }} ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result == 'success' && '✅' || '❌' }} ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Flaky Quarantine Governance | ${{ needs.flaky-quarantine-governance.result == 'success' && '✅' || '❌' }} ${{ needs.flaky-quarantine-governance.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Flaky Quarantine Suite (Non-blocking) | ${{ needs.flaky-tests-quarantine.result == 'success' && '✅' || (needs.flaky-tests-quarantine.result == 'skipped' && '⏭️' || '❌') }} ${{ needs.flaky-tests-quarantine.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release-Blocking Test Gate | ${{ needs.release-blocking-tests.result == 'success' && '✅' || '❌' }} ${{ needs.release-blocking-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release-Blocking CI Gate | ${{ needs.release-blocking-ci.result == 'success' && '✅' || '❌' }} ${{ needs.release-blocking-ci.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Quality | ${{ needs.quality.result == 'success' && '✅' || '❌' }} ${{ needs.quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${{ needs.call-coverage.result == 'success' && '✅' || '❌' }} ${{ needs.call-coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scanning | ${{ needs.call-security.result == 'success' && '✅' || '❌' }} ${{ needs.call-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Governance | ${{ needs.call-governance.result == 'success' && '✅' || '❌' }} ${{ needs.call-governance.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Serialization Policy (R0.14) | ${{ needs.serialization-policy.result == 'success' && '✅' || '❌' }} ${{ needs.serialization-policy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Sample Validation (T3.4) | ${{ needs.sample-validation.result == 'success' && '✅' || '❌' }} ${{ needs.sample-validation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| AOT Sample Validation (S462.4) | ${{ needs.aot-sample-validation.result == 'success' && '✅' || '❌' }} ${{ needs.aot-sample-validation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation Verification (T5.4) | ${{ needs.documentation-validation.result == 'success' && '✅' || '❌' }} ${{ needs.documentation-validation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Performance Gates | ${{ needs.call-performance.result == 'success' && '✅' || (needs.call-performance.result == 'skipped' && '⏭️' || '❌') }} ${{ needs.call-performance.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.release-blocking-ci.result }}" = "success" ]; then
            echo "🎉 **All critical checks passed!** Ready for merge." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Some checks failed.** Please review the results above." >> $GITHUB_STEP_SUMMARY
          fi

  # Test result trend reporting -- advisory, publishes TRX results as GitHub check annotations
  test-result-reporter:
    name: Test Result Reporter (${{ matrix.report.name }})
    runs-on: ubuntu-latest
    needs: [unit-tests, unit-tests-async-risk, integration-tests]
    if: always()
    continue-on-error: true
    permissions:
      contents: read
      checks: write
      pull-requests: write
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        report:
          - { name: unit-core, artifact: test-results-unit-core, path: "**/*.trx" }
          - { name: unit-transport, artifact: test-results-unit-transport, path: "**/*.trx" }
          - { name: unit-middleware, artifact: test-results-unit-middleware, path: "**/*.trx" }
          - { name: unit-excalibur, artifact: test-results-unit-excalibur, path: "**/*.trx" }
          - { name: unit-observability, artifact: test-results-unit-async-risk-observability, path: "**/*.trx" }
          - { name: unit-async-risk-messaging, artifact: test-results-unit-async-risk-messaging, path: "**/*.trx" }
          - { name: integration, artifact: test-results-integration-ubuntu-latest, path: "**/*.trx" }
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1

      - name: Trust workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Download test results
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.report.artifact }}
          path: test-results
        continue-on-error: true

      - name: Publish test results
        if: hashFiles('test-results/**/*.trx') != ''
        uses: dorny/test-reporter@v1
        with:
          name: "Test Results - ${{ matrix.report.name }}"
          path: "test-results/${{ matrix.report.path }}"
          reporter: dotnet-trx
          fail-on-error: false

  transport-conformance:
    name: Transport Conformance
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      - name: Restore & build
        run: |
          dotnet restore
          dotnet build tests/conformance/Excalibur.Dispatch.Tests.Conformance/Excalibur.Dispatch.Tests.Conformance.csproj --configuration Release --no-restore
      - name: Run conformance tests
        run: |
          dotnet test tests/conformance/Excalibur.Dispatch.Tests.Conformance/Excalibur.Dispatch.Tests.Conformance.csproj \
            --configuration Release \
            --no-build \
            --blame-hang-timeout 5m \
            --logger "trx;LogFileName=transport-conformance.trx" \
            --logger "console;verbosity=minimal" \
            --results-directory ./TestResults

      - name: Generate transport parity dashboard
        shell: pwsh
        run: |
          ./eng/ci/validate-framework-governance.ps1 -Mode TransportParity -MatrixPath management/governance/framework-governance.json -OutDir management/reports/TransportParityReport -Enforce:$true

      - name: Upload conformance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: transport-conformance-results
          path: |
            TestResults/*.trx
            management/reports/TransportParityReport

  release-blocking-tests:
    name: Release-Blocking Test Governance
    runs-on: ubuntu-latest
    needs: [unit-shard-coverage, unit-tests, unit-tests-windows]
    if: always()
    steps:
      - name: Validate release-blocking test matrix
        shell: bash
        run: |
          set -euo pipefail
          require_success() {
            local suite="$1"
            local status="$2"
            if [[ "$status" != "success" ]]; then
              failures+=("${suite}=${status}")
            fi
          }
          failures=()

          shard="${{ needs.unit-shard-coverage.result }}"
          unit="${{ needs.unit-tests.result }}"
          unit_win="${{ needs.unit-tests-windows.result }}"

          echo "## ✅ Release-Blocking Test Governance" >> "$GITHUB_STEP_SUMMARY"
          echo "Deterministic blocking tier: core/transport/middleware/excalibur only. Async-risk (messaging/observability) is advisory." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Suite | Status | Tier |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| unit-shard-coverage | $shard | blocking |" >> "$GITHUB_STEP_SUMMARY"
          echo "| unit-tests (deterministic) | $unit | blocking |" >> "$GITHUB_STEP_SUMMARY"
          echo "| unit-tests-windows (deterministic) | $unit_win | blocking |" >> "$GITHUB_STEP_SUMMARY"

          require_success "unit-shard-coverage" "$shard"
          require_success "unit-tests" "$unit"
          require_success "unit-tests-windows" "$unit_win"

          if [ ${#failures[@]} -gt 0 ]; then
            printf '❌ %s\n' "One or more release-blocking test suites failed: ${failures[*]}" >> "$GITHUB_STEP_SUMMARY"
            echo "❌ One or more release-blocking test suites failed." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "✅ All release-blocking test suites passed." >> "$GITHUB_STEP_SUMMARY"

  release-blocking-ci:
    name: Release-Blocking CI Governance
    runs-on: ubuntu-latest
    needs: [build, release-blocking-tests, quality, flaky-quarantine-governance, serialization-policy, call-security, call-governance]
    if: always()
    steps:
      - name: Validate release-blocking CI policy
        shell: bash
        run: |
          set -euo pipefail
          require_success() {
            local gate="$1"
            local status="$2"
            if [[ "$status" != "success" ]]; then
              failures+=("${gate}=${status}")
            fi
          }

          failures=()
          build="${{ needs.build.result }}"
          test_gate="${{ needs.release-blocking-tests.result }}"
          quality="${{ needs.quality.result }}"
          flaky_quarantine="${{ needs.flaky-quarantine-governance.result }}"
          serialization="${{ needs.serialization-policy.result }}"
          security="${{ needs.call-security.result }}"
          governance="${{ needs.call-governance.result }}"

          echo "## 🚦 Release-Blocking CI Governance" >> "$GITHUB_STEP_SUMMARY"
          echo "Required tier: deterministic unit tests + static analysis + package integrity + flaky quarantine governance." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Gate | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| build | $build |" >> "$GITHUB_STEP_SUMMARY"
          echo "| release-blocking-tests | $test_gate |" >> "$GITHUB_STEP_SUMMARY"
          echo "| quality | $quality |" >> "$GITHUB_STEP_SUMMARY"
          echo "| flaky-quarantine-governance | $flaky_quarantine |" >> "$GITHUB_STEP_SUMMARY"
          echo "| serialization-policy | $serialization |" >> "$GITHUB_STEP_SUMMARY"
          echo "| call-security | $security |" >> "$GITHUB_STEP_SUMMARY"
          echo "| call-governance | $governance |" >> "$GITHUB_STEP_SUMMARY"

          require_success "build" "$build"
          require_success "release-blocking-tests" "$test_gate"
          require_success "quality" "$quality"
          require_success "flaky-quarantine-governance" "$flaky_quarantine"
          require_success "serialization-policy" "$serialization"
          require_success "call-security" "$security"
          require_success "call-governance" "$governance"

          if [ ${#failures[@]} -gt 0 ]; then
            printf '❌ %s\n' "Release-blocking CI policy failed: ${failures[*]}" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "✅ Release-blocking CI policy passed." >> "$GITHUB_STEP_SUMMARY"

