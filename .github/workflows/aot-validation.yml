name: AOT Build Validation

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'samples/11-aot/**'
      - 'eng/ci/Invoke-AotPublishValidation.ps1'
      - 'eng/ci/Invoke-AotBuildAnalysis.ps1'
      - 'eng/ci/aot-warning-baseline.json'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'samples/11-aot/**'
      - 'eng/ci/Invoke-AotPublishValidation.ps1'
      - 'eng/ci/Invoke-AotBuildAnalysis.ps1'
      - 'eng/ci/aot-warning-baseline.json'
  workflow_dispatch:
    inputs:
      runtime:
        description: "Target runtime (e.g., linux-x64, win-x64)"
        required: false
        default: 'linux-x64'
        type: string

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  aot-publish-validation:
    name: AOT Publish Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Run AOT publish validation
        shell: pwsh
        run: |
          $runtime = '${{ inputs.runtime }}'
          if (-not $runtime) { $runtime = 'linux-x64' }
          ./eng/ci/Invoke-AotPublishValidation.ps1 `
            -Configuration Release `
            -Runtime $runtime `
            -OutputPath ./validation-results `
            -BaselinePath ./eng/ci/aot-warning-baseline.json
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::AOT publish validation failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }
          "## AOT Publish Validation: PASS" >> $env:GITHUB_STEP_SUMMARY

      - name: Report warnings to step summary
        if: always()
        shell: pwsh
        run: |
          $jsonPath = './validation-results/aot-validation-report.json'
          if (Test-Path $jsonPath) {
            $report = Get-Content $jsonPath | ConvertFrom-Json
            "" >> $env:GITHUB_STEP_SUMMARY
            "## AOT Publish Validation" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "| Metric | Value |" >> $env:GITHUB_STEP_SUMMARY
            "|--------|-------|" >> $env:GITHUB_STEP_SUMMARY
            "| Publish | $(if ($report.PublishSuccess) { 'Success' } else { 'Failed' }) |" >> $env:GITHUB_STEP_SUMMARY
            "| IL Warnings | $($report.TotalWarnings) |" >> $env:GITHUB_STEP_SUMMARY
            "| Errors | $($report.TotalErrors) |" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            foreach ($warning in $report.Warnings | Select-Object -First 20) {
              Write-Host "::warning::$warning"
            }
          } else {
            "## AOT Publish Validation: No report generated" >> $env:GITHUB_STEP_SUMMARY
          }

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aot-validation-report
          path: |
            validation-results/aot-validation-report.html
            validation-results/aot-validation-report.json
            validation-results/*.log

  aot-build-analysis:
    name: AOT Build Analysis (report-only)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Run AOT build analysis (report-only)
        shell: pwsh
        run: |
          # Report-only: capture exit code but do not fail the job
          $exitCode = 0
          try {
            ./eng/ci/Invoke-AotBuildAnalysis.ps1 -OutputPath ./aot-build-analysis
            $exitCode = $LASTEXITCODE
          } catch {
            $exitCode = 2
            Write-Host "::warning::AOT build analysis threw an exception: $_"
          }
          Write-Host "::notice::AOT build analysis exited with code $exitCode (report-only, not failing build)"

      - name: Upload analysis report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aot-build-analysis
          path: |
            aot-build-analysis/aot-build-analysis.json
            aot-build-analysis/aot-build-analysis.md
            aot-build-analysis/*.log
