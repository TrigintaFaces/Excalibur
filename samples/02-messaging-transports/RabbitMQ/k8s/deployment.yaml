# Kubernetes Deployment — RabbitMQ Transport (ReadyToRun)
# See: docs-site/docs/advanced/container-deployment.md §3, §4
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq-sample
  labels:
    app: rabbitmq-sample
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rabbitmq-sample
  template:
    metadata:
      labels:
        app: rabbitmq-sample
    spec:
      # Match SIGTERM grace period to transport drain timeout
      # See: container-deployment.md §4 (Graceful Shutdown)
      terminationGracePeriodSeconds: 35
      containers:
        - name: rabbitmq-sample
          image: rabbitmq-sample:latest
          ports:
            - containerPort: 8080
          env:
            # GC tuning for container workloads
            - name: DOTNET_GCConserveMemory
              value: "9"
            - name: DOTNET_GCHeapHardLimit
              value: "0x10000000"
            # Transport configuration
            - name: RabbitMQ__HostName
              value: "rabbitmq-service"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          # Startup probe: R2R starts faster than JIT
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 2
            failureThreshold: 10
          # Liveness: include transport health
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 15
            failureThreshold: 3
          # Readiness: drain-aware, respects transport shutdown
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 8080
            periodSeconds: 5
            failureThreshold: 2
