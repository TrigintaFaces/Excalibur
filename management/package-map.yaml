# Architectural rules (informational — governance scripts may consume in future).
# The current transitive-bloat-report.ps1 only reads `category`; these are here
# for readability and future enforcement scripts.
rules:
  prohibited_in_core_and_abstractions:
    # Provider-vendor SDK prefixes that must NOT appear in Core/Abstractions transitive graphs.
    - Azure.
    - AWSSDK
    - Amazon.
    - Google.Cloud
    - Google.Apis
    - Confluent.Kafka
    - RabbitMQ.Client
    - MongoDB.Driver
    - StackExchange.Redis
    - Elastic.Clients
    - Microsoft.Data.SqlClient
    - Npgsql

  # Forbidden cross-category references (examples; not yet enforced in script):
  from_abstractions:
    notAllowedToReference:
      - Provider
      - Hosting
      - Excalibur   # Abstractions must not depend on framework-layer concretes
  from_core:
    notAllowedToReference:
      - Provider
      - Hosting
