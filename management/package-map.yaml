# Package Category Map
#
# Purpose: declare the architectural category for every shipping package. The
# `transitive-bloat-report.ps1` governance gate uses this to decide which
# packages to scan for prohibited provider-SDK transitives (Azure.*, AWSSDK,
# Amazon.*, Google.Cloud, Google.Apis, Confluent.Kafka, RabbitMQ.Client,
# MongoDB.Driver, StackExchange.Redis, Elastic.Clients, Microsoft.Data.SqlClient,
# Npgsql).
#
# Category semantics:
#   Abstractions   — contracts only; must not pull ANY provider SDK transitively
#   Core           — canonical Excalibur.Dispatch package; same prohibition as Abstractions
#   Provider       — concrete provider implementation; MAY reference its own vendor SDK
#   Framework      — cross-cutting pieces (Observability, Caching, Resilience, Serialization,
#                    Middleware, SourceGenerators, Testing); NOT scanned — may need infra deps
#   Hosting        — opinionated hosting bridges (AspNetCore, AwsLambda, AzureFunctions, etc.)
#   Excalibur      — DDD/CQRS framework-layer (Domain, EventSourcing, Application, Saga, Outbox,
#                    Inbox, LeaderElection, A3, Compliance, AuditLogging, Data, Cdc, Jobs, Security)
#   Metapackage    — aggregator packages (Excalibur.Postgres, Excalibur.SqlServer)
#   Tool           — standalone tools (Migrate.Tool)
#
# Only `Core` and `Abstractions` are scanned by the transitive-bloat gate.
# When adding a new project: copy an entry with the matching role + category.

version: 1

packages:
  # ─────────────────────────────────────────────────────────────────────────
  # Dispatch Core + Abstractions
